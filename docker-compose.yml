
services:
  # ── Teaching Monster FastAPI Backend ──────────────────────────────────────
  app:
    build: .
    image: teachingmonsterai-app:0.8.0

    container_name: teaching-monster-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./temp:/app/temp
      - ./resources/avatar:/app/resources/avatar   # character images — no rebuild needed
      - ./m8_feedback.json:/app/m8_feedback.json
      - ./m8_errors.json:/app/m8_errors.json
      - ./strategy_stats.json:/app/strategy_stats.json
      - ./.notebooklm_linux:/root/.notebooklm:rw
    environment:
      - PYTHONUNBUFFERED=1
      # Uvicorn keeps HTTP connections alive for up to 30 minutes (contest timeout)
      - UVICORN_TIMEOUT_KEEP_ALIVE=1800
      - UVICORN_TIMEOUT=1800
      - UVICORN_H11_MAX_INCOMPLETE_EVENT_SIZE=16384
      - NLM_SLIDES_ENABLED=${NLM_SLIDES_ENABLED:-true}
      - NLM_AUDIO_ENABLED=${NLM_AUDIO_ENABLED:-true}
      - NLM_SLIDE_TIMEOUT_S=${NLM_SLIDE_TIMEOUT_S:-480}
      - NLM_AUDIO_TIMEOUT_S=${NLM_AUDIO_TIMEOUT_S:-600}
      - NLM_QUIZ_TIMEOUT_S=${NLM_QUIZ_TIMEOUT_S:-300}
      - PYTHONUTF8=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── ngrok Public Tunnel ───────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: teaching-monster-ngrok
    restart: unless-stopped
    command:
      - "start"
      - "--all"
      - "--config=/etc/ngrok.yml"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml
    ports:
      - "4040:4040"
    depends_on:
      - app

networks:
  default:
    name: teaching_monster_net
